on:
  push:
    branches: 
      - main
  pull_request:
    branches:
      - main

jobs:
  checkov-scan:
    runs-on: ubuntu-latest
    steps: 
      - uses: actions/checkout@v4
      - name: python-setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install checkov 
      - run: checkov -d ./terraform/secure --external-checks-dir ./policies --framework terraform

    


      


  
  